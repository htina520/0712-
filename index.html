<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生態圈食物鏈探險</title>
  <style>
    :root {
      --bg: #eef7e8;
      --panel: #ffffff;
      --ink: #173226;
      --muted: #5a6f65;
      --green: #22745d;
      --green-dark: #154f3f;
      --line: #cfe3d0;
      --gold: #f4b942;
      --gold-soft: #fff2c2;
      --red: #c95f3f;
      --blue: #2f6f9f;
      --violet: #6550a8;
      --brown: #7a5c38;
      --shadow: 0 14px 38px rgba(24, 73, 48, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(244, 185, 66, 0.23), transparent 28rem),
        linear-gradient(180deg, #f9fff4 0%, var(--bg) 100%);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #f9fdf6;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 3px solid rgba(244, 185, 66, 0.9);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      width: min(100vw - 24px, 1180px);
      height: 100dvh;
      margin: 0 auto;
      padding: 12px 0;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      color: var(--green-dark);
      font-size: clamp(1.65rem, 3vw, 2.55rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .energy-toggle {
      min-width: 178px;
      color: #241902;
      background: var(--gold-soft);
      border-color: #d69c1f;
      box-shadow: inset 0 0 0 2px rgba(244, 185, 66, 0.28);
    }

    .energy-toggle.is-on {
      background: var(--gold);
    }

    .screen {
      display: grid;
      grid-template-columns: 248px minmax(430px, 1fr) 276px;
      gap: 10px;
      min-height: 0;
    }

    .panel,
    .map-panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 7px;
      color: var(--green-dark);
      font-size: 1rem;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .category-btn,
    .animal-btn,
    .filter-btn {
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .category-btn:hover,
    .animal-btn:hover,
    .filter-btn:hover {
      transform: translateY(-1px);
      border-color: #a9c9aa;
    }

    .is-selected {
      border-color: #d69915;
      background: var(--gold-soft);
      box-shadow: inset 0 0 0 2px rgba(244, 185, 66, 0.3);
    }

    .animal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .animal-btn {
      display: grid;
      place-items: center;
      min-height: 64px;
      padding: 6px;
      text-align: center;
    }

    .animal-emoji {
      display: block;
      font-size: 1.7rem;
      line-height: 1;
    }

    .map-panel {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 10px;
      overflow: hidden;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .swatch {
      width: 26px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .web-wrap {
      position: relative;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 430px;
    }

    .edge {
      stroke: var(--line);
      stroke-width: 3;
      fill: none;
      opacity: 0.42;
    }

    .edge.is-active {
      opacity: 1;
      stroke-width: 5;
    }

    .edge.predation,
    .edge.prey {
      stroke: var(--red);
    }

    .edge.competition {
      stroke: var(--violet);
      stroke-dasharray: 8 7;
    }

    .edge.mutualism {
      stroke: var(--green);
      stroke-dasharray: 2 7;
    }

    .edge.decomposition {
      stroke: var(--brown);
    }

    .edge.energy {
      stroke: var(--gold);
      stroke-width: 6;
      stroke-dasharray: 12 8;
      opacity: 0;
    }

    .show-energy .edge.energy {
      opacity: 0.95;
      animation: flow 900ms linear infinite;
    }

    @keyframes flow {
      to {
        stroke-dashoffset: -40;
      }
    }

    .node {
      cursor: pointer;
    }

    .node circle {
      fill: #fff;
      stroke: var(--line);
      stroke-width: 3;
      filter: drop-shadow(0 7px 10px rgba(18, 67, 45, 0.14));
    }

    .node.is-selected circle {
      fill: var(--gold-soft);
      stroke: #d69915;
      stroke-width: 5;
    }

    .node.is-related circle {
      stroke: var(--green);
      stroke-width: 4;
    }

    .node text {
      text-anchor: middle;
      pointer-events: none;
    }

    .node .emoji {
      font-size: 31px;
    }

    .node .name {
      fill: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .node .level {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .energy-note {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      color: #5d4104;
      background: var(--gold-soft);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .animal-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #fff 0%, #f7fff3 100%);
    }

    .animal-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .big-emoji {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 8px;
      background: var(--gold-soft);
      font-size: 1.9rem;
    }

    .animal-title h2 {
      margin: 0;
      font-size: 1.38rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--green-dark);
      background: #e5f2e5;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .animal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-btn {
      flex: 1 1 72px;
      min-height: 34px;
      padding: 4px 7px;
      font-size: 0.88rem;
    }

    .relationship-list {
      display: grid;
      gap: 7px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .relationship-item,
    .empty-state {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 0.88rem;
    }

    .relationship-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      font-weight: 900;
    }

    .relationship-type {
      padding: 1px 7px;
      border-radius: 999px;
      color: var(--blue);
      background: #edf5ff;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .relationship-type.predation {
      color: var(--red);
      background: #fff0e8;
    }

    .relationship-type.competition {
      color: var(--violet);
      background: #f3efff;
    }

    .relationship-type.mutualism {
      color: var(--green);
      background: #e9f7f1;
    }

    .relationship-type.decomposition {
      color: var(--brown);
      background: #f2eee4;
    }

    .relationship-item p,
    .empty-state p {
      margin: 0;
      color: var(--muted);
    }

    .tutor-button {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      display: grid;
      width: 60px;
      height: 60px;
      min-height: 60px;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: #1877f2;
      box-shadow: 0 12px 28px rgba(24, 119, 242, 0.32);
      font-size: 1.72rem;
    }

    .chat-widget {
      position: fixed;
      right: 22px;
      bottom: 92px;
      z-index: 21;
      display: none;
      grid-template-rows: auto 1fr auto;
      width: min(360px, calc(100vw - 28px));
      height: min(510px, calc(100dvh - 126px));
      overflow: hidden;
      border: 1px solid #d7e1ef;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(22, 45, 72, 0.28);
    }

    .chat-widget.is-open {
      display: grid;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      color: #fff;
      background: #1877f2;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .chat-avatar {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .chat-close {
      width: 34px;
      min-height: 34px;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      font-size: 1.25rem;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      overflow-y: auto;
      background: #f0f2f5;
    }

    .chat-bubble {
      max-width: 82%;
      padding: 8px 11px;
      border-radius: 18px;
      font-size: 0.94rem;
      line-height: 1.42;
      white-space: pre-wrap;
    }

    .chat-bubble.ai {
      align-self: flex-start;
      color: #1c1e21;
      background: #fff;
      border-bottom-left-radius: 5px;
    }

    .chat-bubble.user {
      align-self: flex-end;
      color: #fff;
      background: #1877f2;
      border-bottom-right-radius: 5px;
    }

    .chat-form {
      display: flex;
      align-items: end;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #d7e1ef;
      background: #fff;
    }

    .chat-input {
      flex: 1;
      min-height: 40px;
      max-height: 92px;
      resize: none;
      border: 1px solid #d7e1ef;
      border-radius: 18px;
      padding: 9px 12px;
      background: #f0f2f5;
      color: #1c1e21;
      font: inherit;
    }

    .chat-send {
      min-width: 54px;
      min-height: 40px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      background: #1877f2;
    }

    .chat-send:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    @media (max-width: 900px), (max-height: 680px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100dvh;
      }

      .screen {
        grid-template-columns: 210px 1fr;
      }

      .info-panel {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      svg {
        min-height: 360px;
      }
    }

    @media (max-width: 640px) {
      .topbar,
      .screen,
      .info-panel {
        display: block;
      }

      .energy-toggle,
      .panel,
      .map-panel {
        margin-top: 10px;
        width: 100%;
      }

      .animal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>生態圈食物鏈探險</h1>
        <p class="subtitle">點選角色，觀察牠在食物鏈中的位置、互動關係與能量流動。</p>
      </div>
      <button class="energy-toggle" id="energyToggle" type="button" aria-pressed="false">顯示能量傳遞</button>
    </header>

    <div class="screen">
      <aside class="panel" aria-label="選擇生物">
        <section>
          <h2>1. 選擇角色類型</h2>
          <div class="category-grid" id="categoryButtons"></div>
        </section>
        <section class="animal-picker">
          <h2>2. 按按鈕 A 選擇生物</h2>
          <div class="animal-grid" id="animalButtons"></div>
        </section>
      </aside>

      <section class="map-panel" aria-label="圖像化食物鏈">
        <div class="legend">
          <span style="color: var(--red)"><i class="swatch"></i>掠食</span>
          <span style="color: var(--violet)"><i class="swatch"></i>競爭</span>
          <span style="color: var(--green)"><i class="swatch"></i>共生</span>
          <span style="color: var(--brown)"><i class="swatch"></i>分解</span>
          <span style="color: var(--gold)"><i class="swatch"></i>能量傳遞</span>
        </div>
        <div class="web-wrap" id="webWrap">
          <svg id="foodWeb" viewBox="0 0 620 430" role="img" aria-label="食物鏈角色與互動關係圖">
            <defs>
              <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#c95f3f"></path>
              </marker>
              <marker id="arrowBrown" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#7a5c38"></path>
              </marker>
              <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#f4b942"></path>
              </marker>
            </defs>
            <g id="edgeLayer"></g>
            <g id="energyLayer"></g>
            <g id="nodeLayer"></g>
          </svg>
        </div>
        <div class="energy-note" id="energyNote">能量從植物開始，沿著「被吃」的方向傳給消費者，最後由分解者把養分送回環境。</div>
      </section>

      <aside class="panel info-panel" aria-label="生物資訊與關係">
        <article class="animal-card" id="animalInfo"></article>
        <section>
          <h2>3. 按按鈕 B 看互動關係</h2>
          <div class="filter-row" id="relationshipFilters"></div>
        </section>
        <section class="relationship-list" id="relationshipList"></section>
      </aside>
    </div>
  </main>

  <button class="tutor-button" id="tutorButton" type="button" aria-label="開啟 AI 家教" aria-expanded="false">💬</button>
  <section class="chat-widget" id="chatWidget" aria-label="AI 生態家教對話框">
    <header class="chat-header">
      <div class="chat-title">
        <span class="chat-avatar" aria-hidden="true">🌿</span>
        <span>生態 AI 家教</span>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="關閉對話框">×</button>
    </header>
    <div class="chat-messages" id="chatMessages" aria-live="polite">
      <div class="chat-bubble ai">你好！我可以用這張食物網幫你了解掠食、競爭、共生、分解和能量傳遞。你想問哪一個角色？</div>
    </div>
    <form class="chat-form" id="chatForm">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="問我食物鏈問題..." aria-label="輸入問題"></textarea>
      <button class="chat-send" id="chatSend" type="submit">送出</button>
    </form>
  </section>

  <script>
    const categories = ["肉食動物", "草食動物", "分解者"];
    const relationshipTypes = ["全部", "掠食", "競爭", "共生", "被捕食", "分解"];

    const organisms = [
      { id: "grass", name: "草", category: "生產者", level: "生產者", emoji: "🌱", x: 82, y: 188, description: "草會利用陽光製造養分，是許多草食動物的重要食物。" },
      { id: "leaves", name: "樹葉", category: "生產者", level: "生產者", emoji: "🍃", x: 92, y: 312, description: "樹葉是植物的一部分，可以被鹿等草食動物取食。" },
      { id: "tree", name: "樹", category: "生產者", level: "生產者", emoji: "🌳", x: 110, y: 74, description: "樹是森林中的生產者，也能提供許多生物棲息的地方。" },
      { id: "rabbit", name: "兔子", category: "草食動物", level: "初級消費者", emoji: "🐰", x: 238, y: 180, description: "兔子主要吃草和嫩葉，是許多肉食動物的食物來源。" },
      { id: "deer", name: "鹿", category: "草食動物", level: "初級消費者", emoji: "🦌", x: 250, y: 315, description: "鹿會吃樹葉和草，常在森林或草原中活動。" },
      { id: "grasshopper", name: "蚱蜢", category: "草食動物", level: "初級消費者", emoji: "🦗", x: 240, y: 82, description: "蚱蜢常吃草葉，也可能成為青蛙的食物。" },
      { id: "frog", name: "青蛙", category: "肉食動物", level: "次級消費者", emoji: "🐸", x: 378, y: 80, description: "青蛙會捕食昆蟲，例如蚱蜢，是小型肉食動物。" },
      { id: "snake", name: "蛇", category: "肉食動物", level: "次級消費者", emoji: "🐍", x: 390, y: 178, description: "蛇會捕食青蛙，也可能被老鷹捕食。" },
      { id: "eagle", name: "老鷹", category: "肉食動物", level: "頂級消費者", emoji: "🦅", x: 528, y: 118, description: "老鷹位在食物鏈較高層，會捕食蛇、兔子等動物。" },
      { id: "tiger", name: "老虎", category: "肉食動物", level: "頂級消費者", emoji: "🐯", x: 520, y: 315, description: "老虎是大型肉食動物，會捕食鹿等草食動物。" },
      { id: "earthworm", name: "蚯蚓", category: "分解者", level: "分解者", emoji: "🪱", x: 348, y: 366, description: "蚯蚓會幫忙分解落葉，讓養分回到土壤中。" },
      { id: "mushroom", name: "菇類", category: "分解者", level: "分解者", emoji: "🍄", x: 468, y: 388, description: "菇類能分解枯木或落葉，也可能和植物根部互相幫助。" },
      { id: "bacteria", name: "細菌", category: "分解者", level: "分解者", emoji: "🧫", x: 570, y: 390, description: "細菌很小，但能幫助分解死亡的動植物。" }
    ];

    const extraNames = {
      fallenLeaves: { name: "落葉", emoji: "🍂" },
      deadWood: { name: "枯木", emoji: "木" },
      deadOrganisms: { name: "動植物遺體", emoji: "養分" }
    };

    const relationships = [
      { from: "rabbit", to: "grass", type: "掠食", label: "兔子吃草", explanation: "兔子吃草，草的能量傳給兔子。" },
      { from: "deer", to: "leaves", type: "掠食", label: "鹿吃樹葉", explanation: "鹿吃樹葉，植物能量進入鹿的身體。" },
      { from: "grasshopper", to: "grass", type: "掠食", label: "蚱蜢吃草", explanation: "蚱蜢吃植物，所以牠是初級消費者。" },
      { from: "frog", to: "grasshopper", type: "掠食", label: "青蛙吃蚱蜢", explanation: "青蛙捕食蚱蜢，能量繼續往上傳。" },
      { from: "snake", to: "frog", type: "掠食", label: "蛇吃青蛙", explanation: "蛇捕食青蛙，蛇位在青蛙之上的層級。" },
      { from: "eagle", to: "snake", type: "掠食", label: "老鷹捕食蛇", explanation: "老鷹可能捕食蛇，是蛇的掠食者。" },
      { from: "eagle", to: "rabbit", type: "掠食", label: "老鷹捕食兔子", explanation: "同一個食物網可以有不同路徑。" },
      { from: "tiger", to: "deer", type: "掠食", label: "老虎捕食鹿", explanation: "老虎捕食鹿，是較高層級的消費者。" },
      { from: "rabbit", to: "deer", type: "競爭", label: "兔子和鹿競爭植物", explanation: "兔子和鹿都會吃植物，食物少時可能競爭。" },
      { from: "tree", to: "mushroom", type: "共生", label: "有些菇類和樹互相幫助", explanation: "有些菇類和樹根能互相交換養分。" },
      { from: "earthworm", to: "fallenLeaves", type: "分解", label: "蚯蚓分解落葉", explanation: "蚯蚓分解落葉，讓養分回到土壤。" },
      { from: "mushroom", to: "deadWood", type: "分解", label: "菇類分解枯木", explanation: "菇類分解枯木，把養分重新送回環境。" },
      { from: "bacteria", to: "deadOrganisms", type: "分解", label: "細菌分解動植物遺體", explanation: "細菌分解死亡的動植物，是重要的分解者。" }
    ];

    const energyFlows = [
      ["grass", "grasshopper"],
      ["grasshopper", "frog"],
      ["frog", "snake"],
      ["snake", "eagle"],
      ["grass", "rabbit"],
      ["rabbit", "eagle"],
      ["leaves", "deer"],
      ["deer", "tiger"],
      ["tree", "mushroom"]
    ];

    let selectedCategory = "草食動物";
    let selectedAnimalId = "rabbit";
    let selectedRelationshipType = "全部";
    let showEnergy = false;

    const categoryButtons = document.querySelector("#categoryButtons");
    const animalButtons = document.querySelector("#animalButtons");
    const animalInfo = document.querySelector("#animalInfo");
    const relationshipFilters = document.querySelector("#relationshipFilters");
    const relationshipList = document.querySelector("#relationshipList");
    const webWrap = document.querySelector("#webWrap");
    const edgeLayer = document.querySelector("#edgeLayer");
    const energyLayer = document.querySelector("#energyLayer");
    const nodeLayer = document.querySelector("#nodeLayer");
    const energyToggle = document.querySelector("#energyToggle");
    const energyNote = document.querySelector("#energyNote");
    const tutorButton = document.querySelector("#tutorButton");
    const chatWidget = document.querySelector("#chatWidget");
    const chatClose = document.querySelector("#chatClose");
    const chatMessages = document.querySelector("#chatMessages");
    const chatForm = document.querySelector("#chatForm");
    const chatInput = document.querySelector("#chatInput");
    const chatSend = document.querySelector("#chatSend");

    function getOrganism(id) {
      return organisms.find((organism) => organism.id === id) || extraNames[id];
    }

    function createSvg(tag, attrs = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function getVisibleRelationships() {
      const related = relationships.flatMap((relationship) => {
        if (relationship.from === selectedAnimalId) return [relationship];

        if (relationship.to === selectedAnimalId && relationship.type === "掠食") {
          const predator = getOrganism(relationship.from);
          const prey = getOrganism(relationship.to);
          return [{
            from: relationship.to,
            to: relationship.from,
            type: "被捕食",
            label: `${prey.name}被${predator.name}捕食`,
            explanation: `${predator.name}可能會捕食${prey.name}，所以${prey.name}是獵物。`
          }];
        }

        if (relationship.to === selectedAnimalId && ["競爭", "共生"].includes(relationship.type)) return [relationship];
        return [];
      });

      return selectedRelationshipType === "全部"
        ? related
        : related.filter((relationship) => relationship.type === selectedRelationshipType);
    }

    function relationshipTouchesSelected(relationship) {
      return relationship.from === selectedAnimalId || relationship.to === selectedAnimalId;
    }

    function getRelatedIds() {
      const ids = new Set([selectedAnimalId]);
      relationships.forEach((relationship) => {
        if (relationshipTouchesSelected(relationship)) {
          ids.add(relationship.from);
          ids.add(relationship.to);
        }
      });
      return ids;
    }

    function lineBetween(fromId, toId, options = {}) {
      const from = getOrganism(fromId);
      const to = getOrganism(toId);
      if (!from || !to || from.x === undefined || to.x === undefined) return null;
      const line = createSvg("line", {
        x1: from.x,
        y1: from.y,
        x2: to.x,
        y2: to.y,
        class: options.className || "edge"
      });
      if (options.marker) line.setAttribute("marker-end", options.marker);
      return line;
    }

    function renderCategoryButtons() {
      categoryButtons.innerHTML = "";
      categories.forEach((category, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "category-btn" + (category === selectedCategory ? " is-selected" : "");
        button.textContent = `${index + 1} ${category}`;
        button.setAttribute("aria-pressed", String(category === selectedCategory));
        button.addEventListener("click", () => selectCategory(category));
        categoryButtons.append(button);
      });
    }

    function renderAnimalButtons() {
      animalButtons.innerHTML = "";
      organisms
        .filter((organism) => organism.category === selectedCategory)
        .forEach((organism) => {
          const button = document.createElement("button");
          const selected = organism.id === selectedAnimalId;
          button.type = "button";
          button.className = "animal-btn" + (selected ? " is-selected" : "");
          button.setAttribute("aria-pressed", String(selected));
          button.innerHTML = `<span class="animal-emoji" aria-hidden="true">${organism.emoji}</span>${selected ? "✓ " : ""}${organism.name}`;
          button.addEventListener("click", () => selectAnimal(organism.id));
          animalButtons.append(button);
        });
    }

    function renderSelectedAnimal() {
      const organism = getOrganism(selectedAnimalId);
      animalInfo.innerHTML = `
        <div class="animal-title">
          <span class="big-emoji" aria-hidden="true">${organism.emoji}</span>
          <div>
            <h2>${organism.name}</h2>
            <div class="tags">
              <span class="tag">${organism.category}</span>
              <span class="tag">${organism.level}</span>
            </div>
          </div>
        </div>
        <p>${organism.description}</p>
      `;
    }

    function renderRelationshipFilters() {
      relationshipFilters.innerHTML = "";
      relationshipTypes.forEach((type) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-btn" + (type === selectedRelationshipType ? " is-selected" : "");
        button.textContent = type;
        button.setAttribute("aria-pressed", String(type === selectedRelationshipType));
        button.addEventListener("click", () => selectRelationshipType(type));
        relationshipFilters.append(button);
      });
    }

    function renderRelationships() {
      const visible = getVisibleRelationships();
      relationshipList.innerHTML = "";
      if (visible.length === 0) {
        relationshipList.innerHTML = `<div class="empty-state"><p>目前還沒有這種關係資料，試試其他關係按鈕。</p></div>`;
        return;
      }

      visible.forEach((relationship) => {
        const from = getOrganism(relationship.from);
        const to = getOrganism(relationship.to);
        const item = document.createElement("article");
        item.className = "relationship-item";
        item.innerHTML = `
          <div class="relationship-heading">
            <span>${from.emoji} ${from.name}</span>
            <span>→</span>
            <span>${to.emoji} ${to.name}</span>
            <span class="relationship-type ${getRelationshipClass(relationship.type)}">${relationship.type}</span>
          </div>
          <p><strong>${relationship.label}：</strong>${relationship.explanation}</p>
        `;
        relationshipList.append(item);
      });
    }

    function getRelationshipClass(type) {
      if (type === "掠食" || type === "被捕食") return "predation";
      if (type === "競爭") return "competition";
      if (type === "共生") return "mutualism";
      if (type === "分解") return "decomposition";
      return "";
    }

    function renderFoodWeb() {
      edgeLayer.innerHTML = "";
      energyLayer.innerHTML = "";
      nodeLayer.innerHTML = "";
      webWrap.classList.toggle("show-energy", showEnergy);

      relationships.forEach((relationship) => {
        if (relationship.to && getOrganism(relationship.to)?.x === undefined) return;
        const className = `edge ${getRelationshipClass(relationship.type)} ${relationshipTouchesSelected(relationship) ? "is-active" : ""}`;
        const marker = relationship.type === "掠食" ? "url(#arrowRed)" : relationship.type === "分解" ? "url(#arrowBrown)" : "";
        const line = lineBetween(relationship.from, relationship.to, { className, marker });
        if (line) edgeLayer.append(line);
      });

      energyFlows.forEach(([from, to]) => {
        const line = lineBetween(from, to, { className: "edge energy", marker: "url(#arrowGold)" });
        if (line) energyLayer.append(line);
      });

      const relatedIds = getRelatedIds();
      organisms.forEach((organism) => {
        const group = createSvg("g", {
          class: `node ${organism.id === selectedAnimalId ? "is-selected" : ""} ${relatedIds.has(organism.id) ? "is-related" : ""}`,
          tabindex: "0",
          role: "button",
          "aria-label": `選擇${organism.name}`,
          transform: `translate(${organism.x}, ${organism.y})`
        });
        group.innerHTML = `
          <circle r="43"></circle>
          <text class="emoji" y="-7">${organism.emoji}</text>
          <text class="name" y="18">${organism.name}</text>
          <text class="level" y="34">${organism.level}</text>
        `;
        group.addEventListener("click", () => selectAnimal(organism.id));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectAnimal(organism.id);
          }
        });
        nodeLayer.append(group);
      });
    }

    function renderEnergyState() {
      energyToggle.classList.toggle("is-on", showEnergy);
      energyToggle.setAttribute("aria-pressed", String(showEnergy));
      energyToggle.textContent = showEnergy ? "隱藏能量傳遞" : "顯示能量傳遞";
      energyNote.textContent = showEnergy
        ? "黃色箭頭代表能量流動：太陽能先被植物利用，再經由被吃的方向傳給動物。"
        : "能量從植物開始，沿著「被吃」的方向傳給消費者，最後由分解者把養分送回環境。";
    }

    function selectCategory(category) {
      selectedCategory = category;
      selectedRelationshipType = "全部";
      selectedAnimalId = organisms.find((organism) => organism.category === category).id;
      renderAll();
    }

    function selectAnimal(id) {
      selectedAnimalId = id;
      selectedCategory = getOrganism(id).category === "生產者" ? selectedCategory : getOrganism(id).category;
      selectedRelationshipType = "全部";
      renderAll();
    }

    function selectRelationshipType(type) {
      selectedRelationshipType = type;
      renderRelationshipFilters();
      renderRelationships();
    }

    function renderAll() {
      renderCategoryButtons();
      renderAnimalButtons();
      renderSelectedAnimal();
      renderRelationshipFilters();
      renderRelationships();
      renderFoodWeb();
      renderEnergyState();
    }

    energyToggle.addEventListener("click", () => {
      showEnergy = !showEnergy;
      renderFoodWeb();
      renderEnergyState();
    });

    function toggleChat(open) {
      chatWidget.classList.toggle("is-open", open);
      tutorButton.setAttribute("aria-expanded", String(open));
      if (open) chatInput.focus();
    }

    function appendChatMessage(text, sender) {
      const bubble = document.createElement("div");
      bubble.className = `chat-bubble ${sender}`;
      bubble.textContent = text;
      chatMessages.append(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return bubble;
    }

    function buildTutorMessage(question) {
      const selected = getOrganism(selectedAnimalId);
      const visible = getVisibleRelationships()
        .map((relationship) => `${relationship.label}：${relationship.explanation}`)
        .join("；") || "目前沒有篩選到關係說明";
      return [
        `目前 web app 主題：小學生生態圈食物鏈互動學習。`,
        `目前選到的生物：${selected.name}，分類：${selected.category}，層級：${selected.level}。`,
        `目前關係篩選：${selectedRelationshipType}。`,
        `畫面上的相關關係：${visible}。`,
        `學生問題：${question}`
      ].join("\n");
    }

    async function sendTutorMessage(question) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: buildTutorMessage(question) })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "AI 家教現在無法回覆，請稍後再試。");
      }
      return data.reply || "我還在想這題，可以換個方式再問一次嗎？";
    }

    tutorButton.addEventListener("click", () => {
      toggleChat(!chatWidget.classList.contains("is-open"));
    });

    chatClose.addEventListener("click", () => toggleChat(false));

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if (!question) return;

      appendChatMessage(question, "user");
      chatInput.value = "";
      chatSend.disabled = true;
      const pending = appendChatMessage("我想一下...", "ai");

      try {
        pending.textContent = await sendTutorMessage(question);
      } catch (error) {
        pending.textContent = error.message;
      } finally {
        chatSend.disabled = false;
        chatInput.focus();
      }
    });

    renderAll();
  </script>
</body>
</html>
