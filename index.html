<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生態圈食物鏈探險</title>
  <style>
    :root {
      --bg: #eef7e8;
      --panel: #ffffff;
      --ink: #173226;
      --muted: #5a6f65;
      --green: #22745d;
      --green-dark: #154f3f;
      --line: #cfe3d0;
      --gold: #f4b942;
      --gold-soft: #fff2c2;
      --red: #c95f3f;
      --blue: #2f6f9f;
      --violet: #6550a8;
      --brown: #7a5c38;
      --shadow: 0 14px 38px rgba(24, 73, 48, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(244, 185, 66, 0.23), transparent 28rem),
        linear-gradient(180deg, #f9fff4 0%, var(--bg) 100%);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #f9fdf6;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 3px solid rgba(244, 185, 66, 0.9);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      width: min(100vw - 24px, 1180px);
      height: 100dvh;
      margin: 0 auto;
      padding: 12px 0;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      color: var(--green-dark);
      font-size: clamp(1.65rem, 3vw, 2.55rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .energy-toggle {
      min-width: 178px;
      color: #241902;
      background: var(--gold-soft);
      border-color: #d69c1f;
      box-shadow: inset 0 0 0 2px rgba(244, 185, 66, 0.28);
    }

    .energy-toggle.is-on {
      background: var(--gold);
    }

    .screen {
      display: grid;
      grid-template-columns: 248px minmax(430px, 1fr) 276px;
      gap: 10px;
      min-height: 0;
    }

    .panel,
    .map-panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 7px;
      color: var(--green-dark);
      font-size: 1rem;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .category-btn,
    .animal-btn,
    .filter-btn {
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .category-btn:hover,
    .animal-btn:hover,
    .filter-btn:hover {
      transform: translateY(-1px);
      border-color: #a9c9aa;
    }

    .is-selected {
      border-color: #d69915;
      background: var(--gold-soft);
      box-shadow: inset 0 0 0 2px rgba(244, 185, 66, 0.3);
    }

    .animal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .animal-btn {
      display: grid;
      place-items: center;
      min-height: 64px;
      padding: 6px;
      text-align: center;
    }

    .animal-emoji {
      display: block;
      font-size: 1.7rem;
      line-height: 1;
    }

    .map-panel {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 10px;
      overflow: hidden;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .swatch {
      width: 26px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .web-wrap {
      position: relative;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 430px;
    }

    .edge {
      stroke: var(--line);
      stroke-width: 3;
      fill: none;
      opacity: 0.42;
    }

    .edge.is-active {
      opacity: 1;
      stroke-width: 5;
    }

    .edge.predation,
    .edge.prey {
      stroke: var(--red);
    }

    .edge.competition {
      stroke: var(--violet);
      stroke-dasharray: 8 7;
    }

    .edge.mutualism {
      stroke: var(--green);
      stroke-dasharray: 2 7;
    }

    .edge.decomposition {
      stroke: var(--brown);
    }

    .edge.energy {
      stroke: var(--gold);
      stroke-width: 6;
      stroke-dasharray: 12 8;
      opacity: 0;
    }

    .show-energy .edge.energy {
      opacity: 0.95;
      animation: flow 900ms linear infinite;
    }

    @keyframes flow {
      to {
        stroke-dashoffset: -40;
      }
    }

    .node {
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .node.is-dragging {
      cursor: grabbing;
    }

    .node circle {
      fill: #fff;
      stroke: var(--line);
      stroke-width: 3;
      filter: drop-shadow(0 7px 10px rgba(18, 67, 45, 0.14));
    }

    .node.is-selected circle {
      fill: var(--gold-soft);
      stroke: #d69915;
      stroke-width: 5;
    }

    .node.is-related circle {
      stroke: var(--green);
      stroke-width: 4;
    }

    .node text {
      text-anchor: middle;
      pointer-events: none;
    }

    .node .emoji {
      font-size: 44px;
    }

    .node .name {
      fill: var(--ink);
      font-size: 24px;
      font-weight: 900;
    }

    .node .level {
      fill: var(--muted);
      font-size: 17px;
      font-weight: 800;
    }

    .energy-note {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      color: #5d4104;
      background: var(--gold-soft);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .animal-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #fff 0%, #f7fff3 100%);
    }

    .animal-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .big-emoji {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 8px;
      background: var(--gold-soft);
      font-size: 1.9rem;
    }

    .animal-title h2 {
      margin: 0;
      font-size: 1.38rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--green-dark);
      background: #e5f2e5;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .animal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-btn {
      flex: 1 1 72px;
      min-height: 34px;
      padding: 4px 7px;
      font-size: 0.88rem;
    }

    .relationship-list {
      display: grid;
      gap: 7px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .relationship-item,
    .empty-state {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 0.88rem;
    }

    .relationship-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      font-weight: 900;
    }

    .relationship-type {
      padding: 1px 7px;
      border-radius: 999px;
      color: var(--blue);
      background: #edf5ff;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .relationship-type.predation {
      color: var(--red);
      background: #fff0e8;
    }

    .relationship-type.competition {
      color: var(--violet);
      background: #f3efff;
    }

    .relationship-type.mutualism {
      color: var(--green);
      background: #e9f7f1;
    }

    .relationship-type.decomposition {
      color: var(--brown);
      background: #f2eee4;
    }

    .relationship-item p,
    .empty-state p {
      margin: 0;
      color: var(--muted);
    }

    .tutor-button {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      display: grid;
      width: 60px;
      height: 60px;
      min-height: 60px;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: #1877f2;
      box-shadow: 0 12px 28px rgba(24, 119, 242, 0.32);
      font-size: 1.72rem;
    }

    .chat-widget {
      position: fixed;
      right: 22px;
      bottom: 92px;
      z-index: 21;
      display: none;
      grid-template-rows: auto 1fr auto;
      width: min(360px, calc(100vw - 28px));
      height: min(510px, calc(100dvh - 126px));
      overflow: hidden;
      border: 1px solid #d7e1ef;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(22, 45, 72, 0.28);
    }

    .chat-widget.is-open {
      display: grid;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      color: #fff;
      background: #1877f2;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .chat-avatar {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .chat-close {
      width: 34px;
      min-height: 34px;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      font-size: 1.25rem;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      overflow-y: auto;
      background: #f0f2f5;
    }

    .chat-bubble {
      max-width: 82%;
      padding: 8px 11px;
      border-radius: 18px;
      font-size: 0.94rem;
      line-height: 1.42;
      white-space: pre-wrap;
    }

    .chat-bubble.ai {
      align-self: flex-start;
      color: #1c1e21;
      background: #fff;
      border-bottom-left-radius: 5px;
    }

    .chat-bubble.user {
      align-self: flex-end;
      color: #fff;
      background: #1877f2;
      border-bottom-right-radius: 5px;
    }

    .chat-form {
      display: flex;
      align-items: end;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #d7e1ef;
      background: #fff;
    }

    .chat-input {
      flex: 1;
      min-height: 40px;
      max-height: 92px;
      resize: none;
      border: 1px solid #d7e1ef;
      border-radius: 18px;
      padding: 9px 12px;
      background: #f0f2f5;
      color: #1c1e21;
      font: inherit;
    }

    .chat-send {
      min-width: 54px;
      min-height: 40px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      background: #1877f2;
    }

    .chat-send:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .user-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(16, 36, 28, 0.48);
    }

    .user-modal.is-hidden {
      display: none;
    }

    .user-modal-card {
      width: min(420px, 100%);
      padding: 20px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(10, 34, 24, 0.28);
    }

    .user-modal-card h2 {
      margin-bottom: 6px;
      font-size: 1.32rem;
    }

    .user-modal-card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .user-field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      color: var(--green-dark);
      font-weight: 900;
    }

    .user-field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--ink);
      background: #f9fdf6;
      font: inherit;
    }

    .modal-error {
      min-height: 22px;
      margin-bottom: 10px;
      color: #b6482d;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .modal-confirm {
      width: 100%;
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .modal-confirm:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    @media (max-width: 900px), (max-height: 680px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100dvh;
      }

      .screen {
        grid-template-columns: 210px 1fr;
      }

      .info-panel {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      svg {
        min-height: 360px;
      }
    }

    @media (max-width: 640px) {
      .topbar,
      .screen,
      .info-panel {
        display: block;
      }

      .energy-toggle,
      .panel,
      .map-panel {
        margin-top: 10px;
        width: 100%;
      }

      .animal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-height: 240px;
      }
    }
  </style>
</head>
<body>
  <section class="user-modal" id="userModal" aria-labelledby="userModalTitle" aria-modal="true" role="dialog">
    <form class="user-modal-card" id="userForm" novalidate>
      <h2 id="userModalTitle">開始生態食物鏈探險</h2>
      <p>請先輸入姓名和 email，老師可以用這些資料查看你的操作紀錄。</p>
      <label class="user-field">
        姓名
        <input id="userNameInput" name="userName" type="text" autocomplete="name" required>
      </label>
      <label class="user-field">
        Email
        <input id="userEmailInput" name="userEmail" type="email" autocomplete="email" required>
      </label>
      <div class="modal-error" id="userModalError" aria-live="polite"></div>
      <button class="modal-confirm" id="userConfirmButton" type="submit">確認開始</button>
    </form>
  </section>

  <main class="app">
    <header class="topbar">
      <div>
        <h1>生態圈食物鏈探險</h1>
        <p class="subtitle">點選角色，觀察牠在食物鏈中的位置、互動關係與能量流動。</p>
      </div>
      <button class="energy-toggle" id="energyToggle" type="button" aria-pressed="false">顯示能量傳遞</button>
    </header>

    <div class="screen">
      <aside class="panel" aria-label="選擇生物">
        <section>
          <h2>1. 選擇角色類型</h2>
          <div class="category-grid" id="categoryButtons"></div>
        </section>
        <section class="animal-picker">
          <h2>2. 選擇生物</h2>
          <div class="animal-grid" id="animalButtons"></div>
        </section>
      </aside>

      <section class="map-panel" aria-label="圖像化食物鏈">
        <div class="legend">
          <span style="color: var(--red)"><i class="swatch"></i>掠食</span>
          <span style="color: var(--violet)"><i class="swatch"></i>競爭</span>
          <span style="color: var(--green)"><i class="swatch"></i>共生</span>
          <span style="color: var(--brown)"><i class="swatch"></i>分解</span>
          <span style="color: var(--gold)"><i class="swatch"></i>能量傳遞</span>
        </div>
        <div class="web-wrap" id="webWrap">
          <svg id="foodWeb" viewBox="0 0 1200 760" role="img" aria-label="食物鏈角色與互動關係圖">
            <defs>
              <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#c95f3f"></path>
              </marker>
              <marker id="arrowBrown" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#7a5c38"></path>
              </marker>
              <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#f4b942"></path>
              </marker>
            </defs>
            <g id="edgeLayer"></g>
            <g id="energyLayer"></g>
            <g id="nodeLayer"></g>
          </svg>
        </div>
        <div class="energy-note" id="energyNote">能量從植物開始，沿著「被吃」的方向傳給消費者，最後由分解者把養分送回環境。</div>
      </section>

      <aside class="panel info-panel" aria-label="生物資訊與關係">
        <article class="animal-card" id="animalInfo"></article>
        <section>
          <h2>3. 看互動關係</h2>
          <div class="filter-row" id="relationshipFilters"></div>
        </section>
        <section class="relationship-list" id="relationshipList"></section>
      </aside>
    </div>
  </main>

  <button class="tutor-button" id="tutorButton" type="button" aria-label="開啟 AI 家教" aria-expanded="false">💬</button>
  <section class="chat-widget" id="chatWidget" aria-label="AI 生態家教對話框">
    <header class="chat-header">
      <div class="chat-title">
        <span class="chat-avatar" aria-hidden="true">🌿</span>
        <span>生態 AI 家教</span>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="關閉對話框">×</button>
    </header>
    <div class="chat-messages" id="chatMessages" aria-live="polite">
      <div class="chat-bubble ai">你好！我可以用這張食物網幫你了解掠食、競爭、共生、分解和能量傳遞。你想問哪一個角色？</div>
    </div>
    <form class="chat-form" id="chatForm">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="問我食物鏈問題..." aria-label="輸入問題"></textarea>
      <button class="chat-send" id="chatSend" type="submit">送出</button>
    </form>
  </section>

  <script>
    const GAS_ENDPOINT = ""; // 貼上 GAS Web App 部署網址
    let userName = "";
    let userEmail = "";
    let pendingLogs = [];
    let isSendingLogs = false;
    const LOG_BATCH_SIZE = 5;
    const LOG_STORAGE_KEY = "foodChainPendingLogs";

    const categories = ["肉食動物", "草食動物", "分解者"];
    const relationshipTypes = ["全部", "掠食", "競爭", "共生", "被捕食", "分解"];

    const organisms = [
      { id: "miscanthus", name: "芒草", category: "生產者", level: "生產者", emoji: "🌾", x: 100, y: 300, description: "芒草常見於台灣低海拔山坡，能用陽光製造養分。" },
      { id: "camphorLeaves", name: "樟樹葉", category: "生產者", level: "生產者", emoji: "🍃", x: 100, y: 520, description: "樟樹是台灣常見樹種，葉子和果實能支持許多森林生物。" },
      { id: "figTree", name: "榕樹", category: "生產者", level: "生產者", emoji: "🌳", x: 100, y: 90, description: "榕樹會結果，果實能餵飽松鼠、鳥類和猴子等動物。" },
      { id: "taiwanHare", name: "台灣野兔", category: "草食動物", level: "初級消費者", emoji: "🐰", x: 310, y: 270, description: "台灣野兔會吃草和嫩葉，也可能被猛禽或中型肉食動物捕食。" },

    function getOrganism(id) {
      return organisms.find((organism) => organism.id === id) || extraNames[id];

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function buildLogPayload(logItems) {
      return {
        userName,
        userEmail,
        log: JSON.stringify(logItems)
      };
    }

    function savePendingLogs() {
      try {
        localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify({
          userName,
          userEmail,
          logs: pendingLogs
        }));
      } catch (error) {
        console.warn("Unable to save pending logs:", error);
      }
    }

    function loadPendingLogsForUser() {
      try {
        const saved = JSON.parse(localStorage.getItem(LOG_STORAGE_KEY) || "null");
        if (saved && saved.userEmail === userEmail && Array.isArray(saved.logs)) {
          pendingLogs = [...saved.logs, ...pendingLogs];
        }
      } catch (error) {
        console.warn("Unable to load pending logs:", error);
      }
    }

    async function postToGas(payload) {
      if (!GAS_ENDPOINT) {
        console.info("GAS_ENDPOINT 尚未設定，資料暫存在前端。", payload);
        return false;
      }

      const response = await fetch(GAS_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      return response.type === "opaque" || response.ok;
    }

    function recordLog(action, detail = {}) {
      if (!userName || !userEmail) return;
      pendingLogs.push({
        time: new Date().toISOString(),
        action,
        detail
      });
      savePendingLogs();

      if (pendingLogs.length >= LOG_BATCH_SIZE) {
        flushLogs();
      }
    }

    async function flushLogs(force = false) {
      if (isSendingLogs || pendingLogs.length === 0) return;
      if (!force && pendingLogs.length < LOG_BATCH_SIZE) return;

      const logsToSend = pendingLogs.slice(0, LOG_BATCH_SIZE);
      isSendingLogs = true;
      let sent = false;

      try {
        sent = await postToGas(buildLogPayload(logsToSend));
        if (sent) {
          pendingLogs = pendingLogs.slice(logsToSend.length);
          savePendingLogs();
        }
      } catch (error) {
        console.error("GAS log send failed:", error);
      } finally {
        isSendingLogs = false;
        if (sent && pendingLogs.length >= LOG_BATCH_SIZE) flushLogs();
      }
    }

    async function submitInitialUser(userInfo) {
      const initialLog = [{
        time: new Date().toISOString(),
        action: "user_start",
        detail: { page: "生態圈食物鏈探險" }
      }];
      return postToGas({
        userName: userInfo.userName,
        userEmail: userInfo.userEmail,
        log: JSON.stringify(initialLog)
      });
    }

      const inputEmail = userEmailInput.value.trim();

      }

      userConfirmButton.disabled = true;
      userModalError.textContent = "";
      userName = inputName;

        console.error("Initial user submit failed:", error);

      if (!sent) {
        pendingLogs.unshift({

    function getOrganismOrigin(organism) {
      if (!organism) return "原生種";
      return organism.origin || organismOrigins[organism.id] || "原生種";
    }

    function summarizeOrganism(organism) {
      const related = relationships
        .filter((relationship) => relationship.from === organism.id || relationship.to === organism.id)
        .map((relationship) => relationship.label)
        .join("，") || "目前可放入食物網，並依分類連到相近角色";
      return `${organism.name}，${getOrganismOrigin(organism)}，${organism.category}，${organism.level}，${related}`;
    }

    function createSvg(tag, attrs = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function getVisibleRelationships() {
      const related = relationships.flatMap((relationship) => {
        if (relationship.from === selectedAnimalId) return [relationship];

        if (relationship.to === selectedAnimalId && relationship.type === "掠食") {
          const predator = getOrganism(relationship.from);
          const prey = getOrganism(relationship.to);
          return [{
            from: relationship.to,
            to: relationship.from,
            type: "被捕食",
            label: `${prey.name}被${predator.name}捕食`,
            explanation: `${predator.name}可能會捕食${prey.name}，所以${prey.name}是獵物。`
          }];
        }

        if (relationship.to === selectedAnimalId && ["競爭", "共生"].includes(relationship.type)) return [relationship];
        return [];
      });

      return selectedRelationshipType === "全部"
        ? related
        : related.filter((relationship) => relationship.type === selectedRelationshipType);
    }

    function relationshipTouchesSelected(relationship) {
      return relationship.from === selectedAnimalId || relationship.to === selectedAnimalId;
    }

    function getRelatedIds() {
      const ids = new Set([selectedAnimalId]);
      relationships.forEach((relationship) => {
        if (relationshipTouchesSelected(relationship)) {
          ids.add(relationship.from);
          ids.add(relationship.to);
        }
      });
      return ids;
    }

    function lineBetween(fromId, toId, options = {}) {
      const from = getOrganism(fromId);
      const to = getOrganism(toId);
      if (!from || !to || from.x === undefined || to.x === undefined) return null;
      const line = createSvg("line", {
        x1: from.x,
        y1: from.y,
        x2: to.x,
        y2: to.y,
        class: options.className || "edge"
      });
      if (options.marker) line.setAttribute("marker-end", options.marker);
      return line;
    }

    function getSvgPoint(event) {
      const point = foodWeb.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(foodWeb.getScreenCTM().inverse());
    }

    function setNodePosition(id, x, y) {
      const organism = organisms.find((item) => item.id === id);
      if (organism) {
        organism.x = x;
        organism.y = y;
        return;
      }

      if (extraNames[id]) {
        extraNames[id].x = x;
        extraNames[id].y = y;
      }
    }

    function redrawEdges() {
      edgeLayer.innerHTML = "";
      energyLayer.innerHTML = "";

      relationships.forEach((relationship) => {
        if (relationship.to && getOrganism(relationship.to)?.x === undefined) return;
        const className = `edge ${getRelationshipClass(relationship.type)} ${relationshipTouchesSelected(relationship) ? "is-active" : ""}`;
        const marker = relationship.type === "掠食" ? "url(#arrowRed)" : relationship.type === "分解" ? "url(#arrowBrown)" : "";
        const line = lineBetween(relationship.from, relationship.to, { className, marker });
        if (line) edgeLayer.append(line);
      });

      energyFlows.forEach(([from, to]) => {
        const line = lineBetween(from, to, { className: "edge energy", marker: "url(#arrowGold)" });
        if (line) energyLayer.append(line);
      });
    }

    function nodeNameMarkup(name, firstY = 26) {
      if (name.length <= 4) {
        return `<text class="name" y="${firstY}">${name}</text>`;
      }

      const splitAt = Math.ceil(name.length / 2);
      const first = name.slice(0, splitAt);
      const second = name.slice(splitAt);
      return `
        <text class="name" y="${firstY - 3}">
          <tspan x="0">${first}</tspan>
          <tspan x="0" dy="25">${second}</tspan>
        </text>
      `;
    }

    function bindNodeDrag(group, id, options = {}) {
      group.addEventListener("pointerdown", (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        const start = getSvgPoint(event);
        const item = getOrganism(id);
        dragState = {
          id,
          group,
          startX: start.x,
          startY: start.y,
          offsetX: start.x - item.x,
          offsetY: start.y - item.y,
          moved: false,
          selectable: options.selectable !== false
        };
        group.classList.add("is-dragging");
        group.setPointerCapture(event.pointerId);
      });

      group.addEventListener("pointermove", (event) => {
        if (!dragState || dragState.id !== id) return;
        const point = getSvgPoint(event);
        const x = Math.max(76, Math.min(1124, point.x - dragState.offsetX));
        const y = Math.max(76, Math.min(684, point.y - dragState.offsetY));
        if (Math.abs(point.x - dragState.startX) > 3 || Math.abs(point.y - dragState.startY) > 3) {
          dragState.moved = true;
        }
        setNodePosition(id, x, y);
        group.setAttribute("transform", `translate(${x}, ${y})`);
        redrawEdges();
      });

      group.addEventListener("pointerup", (event) => {
        if (!dragState || dragState.id !== id) return;
        group.classList.remove("is-dragging");
        group.releasePointerCapture(event.pointerId);
        const shouldSelect = dragState.selectable && !dragState.moved;
        const moved = dragState.moved;
        const item = getOrganism(id);
        dragState = null;
        if (moved) {
          recordLog("drag_node", {
            id,
            name: item.name,
            x: Math.round(item.x),
            y: Math.round(item.y)
          });
        }
        if (shouldSelect) selectAnimal(id);
      });

      group.addEventListener("pointercancel", () => {
        group.classList.remove("is-dragging");
        dragState = null;
      });
    }

    function getNodeRadius(id) {
      return extraNames[id] ? 58 : 76;
    }

    function getPlacedNodes() {
      return [
        ...organisms.map((organism) => ({
          id: organism.id,
          x: organism.x,
          y: organism.y,
          radius: getNodeRadius(organism.id)
        })),
        ...Object.entries(extraNames)
          .filter(([, item]) => item.x !== undefined && item.y !== undefined)
          .map(([id, item]) => ({
            id,
            x: item.x,
            y: item.y,
            radius: getNodeRadius(id)
          }))
      ];
    }

    function isOpenPosition(x, y, radius = 43) {
      return getPlacedNodes().every((node) => {
        const dx = x - node.x;
        const dy = y - node.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        return distance >= radius + node.radius + 10;
      });
    }

    function findOpenPosition(category) {
      const columns = {
        "草食動物": [170, 280, 390, 500, 610, 720, 830],
        "肉食動物": [430, 540, 650, 760, 870, 980, 1090],
        "分解者": [500, 610, 720, 830, 940, 1050]
      };
      const rows = [58, 140, 222, 304, 386, 468, 548, 628, 708];
      const xs = columns[category] || [360, 470, 580];

      for (const x of xs) {
        for (const y of rows) {
          if (isOpenPosition(x, y)) return { x, y };
        }
      }

      for (let y = 58; y <= 708; y += 72) {
        for (let x = 64; x <= 1120; x += 76) {
          if (isOpenPosition(x, y)) return { x, y };
        }
      }

      return null;
    }

    function classifyMentionedOrganisms(text, options = {}) {
      let changed = false;
      let selectedMention = null;
      const allKnown = [...organisms, ...addableOrganisms];

      allKnown.forEach((candidate) => {
        const names = [candidate.name, ...(candidate.aliases || [])];
        if (!names.some((name) => text.includes(name))) return;
        selectedMention = candidate;

        if (organisms.some((organism) => organism.id === candidate.id)) return;

        const position = findOpenPosition(candidate.category);
        if (!position) return;

        organisms.push({ ...candidate, ...position });
        addableRelationships
          .filter((relationship) => relationship.from === candidate.id || relationship.to === candidate.id)
          .forEach((relationship) => {
            const hasRelationship = relationships.some((existing) =>
              existing.from === relationship.from &&
              existing.to === relationship.to &&
              existing.type === relationship.type
            );
            const fromExists = getOrganism(relationship.from);
            const toExists = getOrganism(relationship.to);
            if (!hasRelationship && fromExists && toExists) relationships.push(relationship);
          });
        changed = true;
      });

      if (selectedMention && options.select !== false && selectedMention.category !== "生產者") {
        selectedAnimalId = selectedMention.id;
        selectedCategory = selectedMention.category;
        selectedRelationshipType = "全部";
        recordLog("classify_mentioned_organism", {
          id: selectedMention.id,
          name: selectedMention.name,
          category: selectedMention.category,
          level: selectedMention.level,
          origin: getOrganismOrigin(selectedMention),
          wasAdded: changed
        });
        changed = true;
      }

      if (changed) renderAll();
      return selectedMention;
    }

    function renderRelationshipFilters() {

        const button = document.createElement("button");

    function renderRelationships() {
      const visible = getVisibleRelationships();
      relationshipList.innerHTML = "";
      if (visible.length === 0) {
        relationshipList.innerHTML = `<div class="empty-state"><p>目前還沒有這種關係資料，試試其他關係按鈕。</p></div>`;
        return;
      }

      visible.forEach((relationship) => {
        const from = getOrganism(relationship.from);
        const to = getOrganism(relationship.to);
        const item = document.createElement("article");
        item.className = "relationship-item";
        item.innerHTML = `
          <div class="relationship-heading">
            <span>${from.emoji} ${from.name}</span>
            <span>→</span>
            <span>${to.emoji} ${to.name}</span>
            <span class="relationship-type ${getRelationshipClass(relationship.type)}">${relationship.type}</span>
          </div>
          <p><strong>${relationship.label}：</strong>${relationship.explanation}</p>

        relationshipList.append(item);
      });

    function getRelationshipClass(type) {
      if (type === "掠食" || type === "被捕食") return "predation";
      if (type === "競爭") return "competition";
      if (type === "共生") return "mutualism";
      if (type === "分解") return "decomposition";
      return "";
    }

    function renderFoodWeb() {
      edgeLayer.innerHTML = "";
      energyLayer.innerHTML = "";
      nodeLayer.innerHTML = "";
      webWrap.classList.toggle("show-energy", showEnergy);
      redrawEdges();

      const relatedIds = getRelatedIds();
      organisms.forEach((organism) => {
        const group = createSvg("g", {
          class: `node ${organism.id === selectedAnimalId ? "is-selected" : ""} ${relatedIds.has(organism.id) ? "is-related" : ""}`,
          tabindex: "0",
          role: "button",
          "aria-label": `選擇${organism.name}`,
          transform: `translate(${organism.x}, ${organism.y})`
        });
        group.innerHTML = `

          }

      });

      Object.entries(extraNames).forEach(([id, item]) => {
        if (item.x === undefined || item.y === undefined) return;
        const group = createSvg("g", {
          class: `node ${relatedIds.has(id) ? "is-related" : ""}`,
          transform: `translate(${item.x}, ${item.y})`,
          "aria-label": item.name
        });
        group.innerHTML = `
          <circle r="58"></circle>
          <text class="emoji" y="-28">${item.emoji}</text>
          ${nodeNameMarkup(item.name, 21)}
          <text class="level" y="55">${item.level}</text>
        `;
        bindNodeDrag(group, id, { selectable: false });
        nodeLayer.append(group);
      });

      energyToggle.classList.toggle("is-on", showEnergy);
      energyToggle.setAttribute("aria-pressed", String(showEnergy));

    function selectCategory(category) {
      selectedCategory = category;
      selectedRelationshipType = "全部";
      selectedAnimalId = organisms.find((organism) => organism.category === category).id;
      recordLog("select_category", { category, selectedAnimalId });
      renderAll();
    }

    function selectAnimal(id) {
      const organism = getOrganism(id);
      selectedAnimalId = id;
      selectedCategory = organism.category === "生產者" ? selectedCategory : organism.category;
      selectedRelationshipType = "全部";
      recordLog("select_animal", {
        id,
        name: organism.name,
        category: organism.category,
        level: organism.level,
        origin: getOrganismOrigin(organism)
      });
      renderAll();
    }

    function selectRelationshipType(type) {
      selectedRelationshipType = type;
      recordLog("select_relationship_type", { type, selectedAnimalId });
      renderRelationshipFilters();
      renderRelationships();

    function renderAll() {
      renderCategoryButtons();

    function appendChatMessage(text, sender) {

      chatMessages.append(bubble);

    function cleanTutorReply(text) {
      return text.replace(/["'“”‘’「」『』《》`*#_\[\]<>-]/g, "");

    function buildTutorMessage(question) {
      const selected = getOrganism(selectedAnimalId);
      const visible = getVisibleRelationships()
        .map((relationship) => `${relationship.label}：${relationship.explanation}`)
        .join("；") || "目前沒有篩選到關係說明";
      const currentOrganisms = organisms.map(summarizeOrganism).join("；");
      const addableKnowledge = addableOrganisms.map(summarizeOrganism).join("；");
      return [
        `目前 web app 主題：小學生生態圈食物鏈互動學習。`,
        `目前選到的生物：${selected.name}，身分：${getOrganismOrigin(selected)}，分類：${selected.category}，層級：${selected.level}。`,
        `目前關係篩選：${selectedRelationshipType}。`,
        `畫面上的相關關係：${visible}。`,
        `目前圖上的生物資料：${currentOrganisms}。`,
        `可加入圖中的台灣動物資料：${addableKnowledge}。`,
        `如果學生提到任何資料中的動物，回答一定要包含牠是原生種、特有種、特有亞種或外來種，以及牠在食物鏈中的關係。`,
        `如果需要舉其他台灣動物，優先使用這些可加入圖中的名稱：${addableOrganisms.map((organism) => organism.name).join("，")}。`,
        `回答時若提到上述名稱，前端會把該動物加入食物網。`,
        `不要說不知道、不確定、不清楚。請根據資料用小學生能懂的方式回答。`,
        `學生問題：${question}`
      ].join("\n");
    }

    async function sendTutorMessage(question) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: buildTutorMessage(question) })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "AI 家教現在無法回覆，請稍後再試。");
      }
      return data.reply || "我還在想這題，可以換個方式再問一次嗎？";
    }

    tutorButton.addEventListener("click", () => {
      const open = !chatWidget.classList.contains("is-open");
      recordLog("toggle_ai_tutor", { open });
      toggleChat(open);
    });

    chatClose.addEventListener("click", () => {
      recordLog("toggle_ai_tutor", { open: false });
      toggleChat(false);
    });

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if (!question) return;

      appendChatMessage(question, "user");
      recordLog("chat_input", { text: question });
      const mentioned = classifyMentionedOrganisms(question);
      if (mentioned) {
        appendChatMessage(`${mentioned.name}已分類到${mentioned.category}，${mentioned.level}，${getOrganismOrigin(mentioned)}。`, "ai");
      }
      chatInput.value = "";
      chatSend.disabled = true;
      const pending = appendChatMessage("我想一下...", "ai");

      try {
        const reply = cleanTutorReply(await sendTutorMessage(question));
        pending.textContent = reply;
        classifyMentionedOrganisms(reply, { select: false });
      } catch (error) {
        pending.textContent = cleanTutorReply(error.message);
      } finally {
        chatSend.disabled = false;
        chatInput.focus();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        flushLogs(true);
      }
    });

    window.addEventListener("online", () => flushLogs(true));

    renderAll();
  </script>
</body>
</html>
